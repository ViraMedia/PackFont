<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خرید پک فونت VIP</title>

<style>

:root{
--bg-color:#0a192f;
--card-bg:rgba(15,23,42,0.6);
--card-border:rgba(45,56,77,0.4);
--text-main:#ccd6f6;
--text-sub:#8892b0;
--purple:#c770f0;
--blue:#64ffda;
}

body{
margin:0;
padding:0;
font-family:Tahoma,"Segoe UI",Arial,sans-serif;
background-color:var(--bg-color);

background-image:
radial-gradient(circle at 15% 50%,rgba(59,130,246,0.15),transparent 25%),
radial-gradient(circle at 85% 30%,rgba(168,85,247,0.15),transparent 25%);

min-height:100vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;

color:var(--text-main);
padding:40px 15px;
box-sizing:border-box;
}

.header{
text-align:center;
margin-bottom:40px;
}

h1{
font-size:38px;
color:var(--blue);
margin-bottom:10px;
}

.header p{
color:var(--text-sub);
max-width:600px;
margin:auto;
}

.section-title{
font-size:30px;
color:var(--purple);
margin-bottom:30px;
}

.grid{
display:flex;
justify-content:center;
align-items:center;
width:100%;
}

.card{

background:var(--card-bg);
backdrop-filter:blur(15px);

border:1px solid var(--card-border);
border-radius:20px;

padding:40px 35px;

width:280px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

box-shadow:0 10px 30px rgba(0,0,0,0.4);

transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.token-amount{
font-size:60px;
font-weight:bold;
color:var(--blue);
margin:10px 0;
}

.label{
color:var(--text-sub);
font-size:16px;
}

.price{
font-size:28px;
font-weight:bold;
margin:20px 0;
}

.price span{
font-size:18px;
color:var(--text-sub);
}

.btn{
display:inline-block;

padding:12px 35px;

background:var(--blue);
color:#0a192f;

border-radius:30px;

font-weight:bold;
text-decoration:none;

transition:0.3s;
}

.btn:hover{
background:#4ff1d7;
transform:translateY(-2px);
}

@media(max-width:700px){

h1{
font-size:30px;
}

.section-title{
font-size:24px;
}

.card{
width:100%;
max-width:320px;
}

}

</style>
</head>

<body>

<header class="header">

<h1>خرید پک فونت VIP</h1>

<p>
جایی که تمامی فونت های فارسی خوب رایگان پیش هم هستند.
</p>

</header>

<div class="section-title">
خرید ویژه
</div>

<div class="grid">

<div class="card">

<div class="label">مهلت دانلود:</div>

<div class="token-amount">7</div>

<div class="label">روز</div>

<div class="price">
رایگان <span>(فرصت محدود)</span>
</div>

<a href="https://eitaa.com/joinchat/1215170110C05330e4bba" target="_blank" class="btn">
خرید پک
</a>

</div>

</div>

</body>
</html>
